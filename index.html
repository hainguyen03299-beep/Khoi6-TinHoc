<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KHO GAME TIN HỌC</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #a8e063, #56ab2f);
    color: white;
    overflow-x: hidden;
}

/* ANIMATION PAGE LOAD */
body {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 0.6s ease forwards;
}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* HEADER */
.header {
    padding: 30px 15px 10px;
    text-align: center;
}

.header h1 {
    margin: 0;
    font-size: 26px;
}

.header p {
    margin-top: 8px;
    font-size: 14px;
    opacity: 0.9;
}

/* GRID */
.grid {
    display: grid;
    gap: 15px;
    padding: 15px;
    grid-template-columns: 1fr;
}

/* TABLET */
@media (min-width: 600px) {
    .grid { grid-template-columns: 1fr 1fr; }
}

/* LAPTOP */
@media (min-width: 1024px) {
    .grid { grid-template-columns: 1fr 1fr 1fr 1fr; }
}

/* CARD */
.card {
    background: white;
    color: #2e7d32;
    border-radius: 20px;
    padding: 25px 15px;
    text-align: center;
    text-decoration: none;
    font-weight: bold;
    font-size: 18px;
    box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    transition: 0.3s;
}

/* HOVER PC */
.card:hover {
    transform: translateY(-5px);
}

/* CLICK MOBILE */
.card:active {
    transform: scale(0.92);
}

/* ICON */
.icon {
    font-size: 40px;
    margin-bottom: 10px;
}

/* FOOTER */
.footer {
    text-align: center;
    font-size: 12px;
    opacity: 0.8;
    padding: 15px;
}

/* TRANSITION KHI CHUYỂN TRANG */
.fade-out {
    animation: fadeOut 0.4s forwards;
}

@keyframes fadeOut {
    to {
        opacity: 0;
        transform: translateY(-20px);
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>🌿 Kho Game Tin Học</h1>
    <p>Học vui – Chơi vui – Thông minh hơn mỗi ngày!</p>
</div>

<div class="grid">

    <a class="card" href="https://hainguyen03299-beep.github.io/Khoi6-TinHoc/indexKhoi6.html">
        <div class="icon">📘</div>
        Khối 6
    </a>

    <a class="card" href="https://hainguyen03299-beep.github.io/Khoi7-TinHoc/indexKhoi7.html">
        <div class="icon">📗</div>
        Khối 7
    </a>

    <a class="card" href="https://hainguyen03299-beep.github.io/Khoi8-TinHoc/indexKhoi8.html">
        <div class="icon">📙</div>
        Khối 8
    </a>

    <a class="card" href="https://hainguyen03299-beep.github.io/Khoi9-TinHoc/indexKhoi9.html">
        <div class="icon">📕</div>
        Khối 9
    </a>

</div>

<div class="footer">
    🌱 Thiết kế bởi Cô Nguyên - THCS Tam Giang
</div>

<script>
// ANIMATION CHUYỂN TRANG
document.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", function(e) {
        e.preventDefault();
        const href = this.getAttribute("href");
        document.body.classList.add("fade-out");

        setTimeout(() => {
            window.location.href = href;
        }, 300);
    });
});
</script>

</body>
</html>
