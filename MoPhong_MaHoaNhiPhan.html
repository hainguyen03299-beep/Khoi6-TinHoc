<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mã Hóa Cùng Cô Nguyên</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            height: 100vh;
            background-color: #F3F0FF;
            color: #2D3436;
        }
        .btn-active:active { transform: translateY(4px); shadow: none; }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px; width: 16px;
            border-radius: 4px;
            background: white;
            border: 3px solid #6C5CE7;
            cursor: pointer;
        }
        .step-card {
            transition: all 0.3s ease;
        }
        /* Hiệu ứng nháy cho số mục tiêu */
        .animate-pulse-fast {
            animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .8; transform: scale(1.05); }
        }
    </style>
</head>
<body class="p-3 flex flex-col">

    <!-- Header -->
    <header class="bg-gradient-to-r from-[#6C5CE7] to-[#A29BFE] px-6 py-3 rounded-[24px] shadow-[0_4px_0_#4834D4] border-2 border-white flex items-center justify-between mb-3 flex-shrink-0">
        <div class="flex items-center gap-3">
            <div class="bg-white p-2 rounded-xl text-[#6C5CE7] shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
            </div>
            <div>
                <h1 class="text-xl font-black text-white leading-none uppercase italic tracking-tight">Mã Hóa Cùng Cô Nguyên</h1>
                <p class="text-[#EFEDFF] text-[10px] font-bold mt-1 uppercase">Chinh phục Số nhị phân cùng lớp 6 THCS Tam Giang</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4 bg-white/20 p-1.5 px-4 rounded-2xl border border-white/30 backdrop-blur-sm">
            <div class="flex flex-col items-center">
                <label class="text-[8px] font-black text-white uppercase tracking-widest">SỐ CẦN TÌM</label>
                <input id="targetInput" type="number" value="4" class="w-12 bg-transparent outline-none font-black text-center text-white text-xl">
            </div>
            <button onclick="startSimulation()" class="bg-[#FF7675] hover:bg-[#D63031] text-white px-5 py-2 rounded-xl font-black shadow-[0_4px_0_#B71515] transition-all active:translate-y-1 active:shadow-none uppercase text-xs">
                BẮT ĐẦU!
            </button>
        </div>
    </header>

    <!-- Main -->
    <main class="flex-grow grid grid-cols-12 gap-4 overflow-hidden">
        
        <!-- Cột Trái -->
        <div class="col-span-7 flex flex-col bg-white rounded-[32px] border-4 border-[#6C5CE7] shadow-[0_8px_0_#E0D9FF] overflow-hidden">
            <div class="p-3 bg-[#F8F7FF] border-b-2 border-[#F0EDFF] flex items-center justify-between">
                <h2 id="rangeTitle" class="text-sm font-black text-[#6C5CE7] flex items-center gap-2 italic uppercase">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
                    THỰC NGHIỆM SỐ
                </h2>
                <div class="flex gap-3">
                    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-[#C4FF00] border border-[#84CC16]"></div><span class="text-[9px] font-black uppercase">Trái (0)</span></div>
                    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-[#00F5FF] border border-[#0EA5E9]"></div><span class="text-[9px] font-black uppercase">Phải (1)</span></div>
                </div>
            </div>
            
            <div id="stepsContainer" class="flex-grow p-4 space-y-2 overflow-hidden flex flex-col justify-around">
                <div class="h-full flex flex-col items-center justify-center text-[#D1D1FF] space-y-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" class="animate-bounce"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <p class="font-black text-sm uppercase italic text-center px-10">Nhập số và nhấn Bắt đầu để cô trò mình cùng giải mã!</p>
                </div>
            </div>
        </div>

        <!-- Cột Phải -->
        <div class="col-span-5 flex flex-col gap-4 overflow-hidden">
            
            <div class="bg-[#FFF9E6] p-5 rounded-[32px] border-4 border-[#FFD93D] shadow-[0_6px_0_#FFF0B3] flex-shrink-0">
                <h3 class="bg-[#FF8400] text-white px-4 py-1 rounded-xl font-black text-[10px] inline-block mb-3 italic">NHIỆM VỤ GIẢI MÃ</h3>
                <div id="missionDesc" class="space-y-2 h-[160px] flex flex-col justify-center text-xs font-black">
                    <div class="grid grid-cols-2 gap-2 opacity-40">
                        <div class="bg-white/60 p-2 rounded-lg border border-white text-center">CHIA ĐÔI</div>
                        <div class="bg-white/60 p-2 rounded-lg border border-white text-center">TÌM VỊ TRÍ</div>
                        <div class="bg-white/60 p-2 rounded-lg border border-white text-center">GHI MÃ 0/1</div>
                        <div class="bg-white/60 p-2 rounded-lg border border-white text-center">THU GỌN</div>
                    </div>
                </div>
            </div>

            <div class="bg-[#2D3436] p-4 rounded-[32px] border-4 border-[#636E72] flex-shrink-0">
                <h3 class="text-[#55E6C1] font-black text-[9px] uppercase mb-2 tracking-widest flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
                    Kết quả nhị phân
                </h3>
                <div id="binaryResult" class="text-5xl font-mono font-black text-[#55E6C1] tracking-[0.1em] flex items-center justify-center h-12 overflow-hidden italic">
                    <span id="codeText"></span><span class="animate-pulse text-[#434c4e]">_</span>
                </div>
                <div id="successBadge" class="hidden mt-2 py-1.5 bg-[#55E6C1] rounded-xl text-center text-[#1B4F43] font-black text-xs animate-bounce flex items-center justify-center gap-2">
                    HOÀN THÀNH XUẤT SẮC! 🎉
                </div>
            </div>

            <div class="mt-auto bg-white p-4 rounded-[32px] border-4 border-[#6C5CE7] flex flex-col gap-3 shadow-[0_6px_0_#E0D9FF]">
                <div class="grid grid-cols-2 gap-3">
                    <button id="btnAuto" onclick="toggleAuto()" class="py-3 rounded-2xl font-black text-white text-xs transition-all active:translate-y-1 shadow-[0_4px_0_#B71515] bg-[#FF7675] flex items-center justify-center gap-2 uppercase">
                        TỰ ĐỘNG
                    </button>
                    <button id="btnNext" onclick="nextStep()" class="py-3 rounded-2xl font-black text-white text-xs transition-all active:translate-y-1 shadow-[0_4px_0_#15803D] bg-[#22C55E] flex items-center justify-center gap-2 uppercase">
                        BƯỚC TIẾP
                    </button>
                </div>
                
                <div class="flex items-center gap-3 px-3 bg-slate-50 py-2 rounded-xl border border-slate-100">
                    <span class="text-[8px] font-black text-slate-400 uppercase italic">Chậm</span>
                    <input id="speedRange" type="range" min="500" max="3500" step="100" value="2500" class="flex-grow h-2 bg-[#D1D1FF] rounded-full appearance-none cursor-pointer accent-[#6C5CE7]">
                    <span class="text-[8px] font-black text-[#6C5CE7] uppercase italic">Nhanh</span>
                </div>
                
                <button onclick="resetSim()" class="text-[#A29BFE] font-black text-[10px] hover:text-[#6C5CE7] flex items-center justify-center gap-2 uppercase tracking-tighter">
                    LÀM MỚI
                </button>
            </div>
        </div>
    </main>

    <!-- Hệ thống âm thanh -->
    <script>
        const sounds = {
            click: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
            start: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            step: new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3'),
            victory: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3')
        };

        function playSound(name) {
            if (sounds[name]) {
                sounds[name].currentTime = 0;
                sounds[name].play().catch(e => console.log("Audio play blocked by browser"));
            }
        }

        let targetNum = 4;
        let maxRange = 8;
        let currentStepIdx = -1;
        let steps = [];
        let isPlaying = false;
        let timer = null;

        function calculateOptimalRange(num) {
            let range = 8;
            while (range <= num) range *= 2;
            return range;
        }

        function generateSteps(target, max) {
            let low = 0;
            let high = max - 1;
            const generatedSteps = [];
            let currentCode = "";

            generatedSteps.push({
                range: [low, high],
                leftHalf: null,
                rightHalf: null,
                decision: null,
                code: "",
                description: `Bắt đầu với dãy 0 đến ${high}`
            });

            while (low < high) {
                const mid = Math.floor((low + high) / 2);
                const leftHalf = [low, mid];
                const rightHalf = [mid + 1, high];
                let decision = "";
                let bit = "";
                
                if (target <= mid) {
                    decision = "TRÁI";
                    bit = "0";
                    high = mid;
                } else {
                    decision = "PHẢI";
                    bit = "1";
                    low = mid + 1;
                }
                
                currentCode += bit;
                generatedSteps.push({
                    range: [low, high],
                    prevRange: generatedSteps[generatedSteps.length - 1].range,
                    leftHalf,
                    rightHalf,
                    decision,
                    bit,
                    code: currentCode,
                    description: `Số ${target} nằm ở bên ${decision}`
                });
            }
            return generatedSteps;
        }

        function renderNumberLine(stepIdx) {
            const stepData = steps[stepIdx];
            let html = `<div class="flex flex-wrap gap-1 justify-center py-2 px-2 rounded-[20px] border-4 transition-all duration-300 bg-white border-[#6C5CE7] shadow-[0_6px_0_#A29BFE]">`;
            
            for (let i = 0; i < maxRange; i++) {
                let statusClass = "bg-slate-100 border-slate-200 text-slate-300";
                const [low, high] = stepData.prevRange || stepData.range;
                const inRange = i >= low && i <= high;

                if (i === targetNum) {
                    statusClass = "bg-[#FFD93D] border-[#FF8400] text-[#D35400] z-10 shadow-md animate-pulse-fast";
                } else if (inRange) {
                    if (stepData.leftHalf && stepData.rightHalf) {
                        const [lS, lE] = stepData.leftHalf;
                        statusClass = (i >= lS && i <= lE) ? "bg-[#C4FF00] border-[#84CC16] text-[#365314]" : "bg-[#00F5FF] border-[#0EA5E9] text-[#0C4A6E]";
                    } else {
                        statusClass = "bg-[#E0E7FF] border-[#6366F1] text-[#4338CA]";
                    }
                } else {
                    statusClass = "bg-transparent border-transparent text-transparent opacity-0 scale-50";
                }

                const boxSize = maxRange > 16 ? "w-6 h-6 text-[10px]" : maxRange > 8 ? "w-8 h-8 text-xs" : "w-9 h-9 text-sm";
                html += `<div class="${boxSize} flex items-center justify-center rounded-lg font-black border-b-[3px] transition-all duration-500 ${statusClass}">${i}</div>`;
            }
            html += `</div>`;
            return html;
        }

        function updateUI() {
            const container = document.getElementById('stepsContainer');
            const missionBox = document.getElementById('missionDesc');
            const codeText = document.getElementById('codeText');
            const badge = document.getElementById('successBadge');
            
            if (currentStepIdx < 0) return;

            let historyHtml = "";
            for (let i = 0; i <= currentStepIdx; i++) {
                const step = steps[i];
                const opacity = i === currentStepIdx ? "opacity-100" : "opacity-30 scale-95";
                historyHtml += `
                    <div class="step-card ${opacity}">
                        <div class="flex items-center gap-2 mb-0.5">
                            <div class="bg-[#6C5CE7] text-white font-black px-2 py-0.5 rounded-full text-[8px]">VÒNG ${i}</div>
                            <span class="text-[9px] font-bold text-slate-400 italic truncate uppercase">${step.description}</span>
                        </div>
                        ${renderNumberLine(i)}
                    </div>
                `;
            }
            container.innerHTML = historyHtml;

            const current = steps[currentStepIdx];
            if (current.decision) {
                missionBox.innerHTML = `
                    <div class="space-y-2 animate-in fade-in duration-300">
                        <div class="flex items-center gap-3 bg-white border p-2 rounded-xl">
                            <div class="h-6 w-6 rounded-lg bg-[#6C5CE7] text-white flex items-center justify-center text-[10px]">1</div>
                            <p>CHIA ĐÔI dãy số</p>
                        </div>
                        <div class="flex items-center gap-3 bg-white border p-2 rounded-xl">
                            <div class="h-6 w-6 rounded-lg bg-[#FF7675] text-white flex items-center justify-center text-[10px]">2</div>
                            <p>Số ${targetNum} ở bên <span class="px-2 py-0.5 rounded-lg text-white ${current.decision === 'TRÁI' ? 'bg-[#84CC16]' : 'bg-[#0EA5E9]'}">${current.decision}</span></p>
                        </div>
                        <div class="flex items-center gap-3 bg-white border p-2 rounded-xl">
                            <div class="h-6 w-6 rounded-lg bg-[#FFD93D] text-[#D84315] flex items-center justify-center text-[10px]">3</div>
                            <p>GHI MÃ: <span class="bg-[#2D3436] text-[#55E6C1] px-3 py-0.5 rounded-lg font-mono text-lg">${current.bit}</span></p>
                        </div>
                    </div>
                `;
            } else {
                missionBox.innerHTML = `<div class="text-center italic text-slate-400">Bắt đầu chia nhỏ dãy số...</div>`;
            }

            codeText.innerText = current.code;

            if (currentStepIdx === steps.length - 1) {
                badge.classList.remove('hidden');
                isPlaying = false;
                document.getElementById('btnAuto').innerText = "TỰ ĐỘNG";
                playSound('victory');
            } else {
                badge.classList.add('hidden');
            }
        }

        function startSimulation() {
            playSound('start');
            const input = document.getElementById('targetInput').value;
            targetNum = parseInt(input) || 0;
            maxRange = calculateOptimalRange(targetNum);
            
            document.getElementById('rangeTitle').innerText = `THỰC NGHIỆM SỐ (Dãy 0 - ${maxRange-1})`;
            
            steps = generateSteps(targetNum, maxRange);
            currentStepIdx = 0;
            updateUI();
        }

        function nextStep() {
            if (currentStepIdx < steps.length - 1) {
                playSound('step');
                currentStepIdx++;
                updateUI();
            }
        }

        function toggleAuto() {
            if (steps.length === 0) return;
            playSound('click');
            isPlaying = !isPlaying;
            const btn = document.getElementById('btnAuto');
            
            if (isPlaying) {
                btn.innerText = "TẠM DỪNG";
                btn.classList.replace('bg-[#FF7675]', 'bg-[#FFB627]');
                autoRun();
            } else {
                btn.innerText = "TỰ ĐỘNG";
                btn.classList.replace('bg-[#FFB627]', 'bg-[#FF7675]');
                clearTimeout(timer);
            }
        }

        function autoRun() {
            if (!isPlaying || currentStepIdx >= steps.length - 1) return;
            
            const speed = 4000 - document.getElementById('speedRange').value;
            timer = setTimeout(() => {
                nextStep();
                if (currentStepIdx < steps.length - 1) {
                    autoRun();
                } else {
                    isPlaying = false;
                    document.getElementById('btnAuto').innerText = "TỰ ĐỘNG";
                }
            }, speed);
        }

        function resetSim() {
            playSound('click');
            currentStepIdx = -1;
            steps = [];
            isPlaying = false;
            clearTimeout(timer);
            document.getElementById('stepsContainer').innerHTML = `
                <div class="h-full flex flex-col items-center justify-center text-[#D1D1FF] space-y-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" class="animate-bounce"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <p class="font-black text-sm uppercase italic text-center px-10">Nhập số và nhấn Bắt đầu!</p>
                </div>`;
            document.getElementById('missionDesc').innerHTML = `<div class="grid grid-cols-2 gap-2 opacity-40"><div class="bg-white/60 p-2 rounded-lg border border-white text-center">CHIA ĐÔI</div><div class="bg-white/60 p-2 rounded-lg border border-white text-center">TÌM VỊ TRÍ</div><div class="bg-white/60 p-2 rounded-lg border border-white text-center">GHI MÃ 0/1</div><div class="bg-white/60 p-2 rounded-lg border border-white text-center">THU GỌN</div></div>`;
            document.getElementById('codeText').innerText = "";
            document.getElementById('successBadge').classList.add('hidden');
            document.getElementById('btnAuto').innerText = "TỰ ĐỘNG";
            document.getElementById('btnAuto').classList.replace('bg-[#FFB627]', 'bg-[#FF7675]');
        }
    </script>
</body>
</html>
