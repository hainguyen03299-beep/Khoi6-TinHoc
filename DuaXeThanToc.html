<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đua Xe Cùng Internet - Lớp 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a202c; }
        #game-container { position: relative; width: 100vw; height: 100vh; max-width: 600px; margin: 0 auto; background: #333; overflow: hidden; border-left: 4px solid #444; border-right: 4px solid #444; }
        .road { position: absolute; width: 100%; height: 100%; background: linear-gradient(#444 0%, #444 100%); overflow: hidden; }
        .lane-mark { position: absolute; width: 8px; height: 50px; background: white; left: 50%; transform: translateX(-50%); }
        #car { position: absolute; bottom: 20px; width: 60px; height: 100px; transition: left 0.1s ease-out; z-index: 10; }
        .obstacle { position: absolute; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; font-weight: bold; z-index: 5; transition: transform 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .question-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 92%; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); z-index: 100; display: none; border: 5px solid #3b82f6; animation: scaleIn 0.3s ease-out; }
        @keyframes scaleIn { from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        .ui-panel { position: absolute; top: 10px; left: 10px; color: white; z-index: 20; background: rgba(15, 23, 42, 0.85); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); pointer-events: none; min-width: 150px; }
        .speed-boost-btn { position: absolute; bottom: 25px; right: 25px; background: linear-gradient(135deg, #f59e0b, #ea580c); color: white; width: 75px; height: 75px; border-radius: 50%; cursor: pointer; border: 4px solid white; font-weight: 900; box-shadow: 0 5px 15px rgba(0,0,0,0.4); z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1; }
        .speed-boost-btn:active { transform: scale(0.9); }
        .btn-ans { display: block; width: 100%; padding: 14px; margin: 10px 0; background: #f1f5f9; color: #1e293b; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; text-align: left; font-weight: 600; transition: all 0.2s; }
        .btn-ans:hover { background: #3b82f6; color: white; border-color: #2563eb; transform: translateX(5px); }
        .screen-overlay { position: absolute; inset: 0; background: rgba(2, 6, 23, 0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; color: white; text-align: center; padding: 30px; }
        #finish-screen { display: none; background: radial-gradient(circle, #1e3a8a 0%, #020617 100%); }
        .vinh-danh { color: #facc15; font-size: 2.5rem; font-weight: 900; margin-bottom: 5px; text-shadow: 0 0 15px rgba(250, 204, 21, 0.5); }
    </style>
</head>
<body>

<div id="game-container">
    <div class="road" id="road"></div>
    
    <div id="car">
        <svg viewBox="0 0 60 100">
            <rect x="5" y="0" width="50" height="100" rx="12" fill="#ef4444" />
            <rect x="10" y="18" width="40" height="35" rx="6" fill="#bae6fd" />
            <rect x="7" y="75" width="12" height="20" rx="2" fill="#111" />
            <rect x="41" y="75" width="12" height="20" rx="2" fill="#111" />
            <rect x="7" y="5" width="12" height="20" rx="2" fill="#111" />
            <rect x="41" y="5" width="12" height="20" rx="2" fill="#111" />
            <circle cx="15" cy="5" r="4" fill="#fef08a" />
            <circle cx="45" cy="5" r="4" fill="#fef08a" />
        </svg>
    </div>

    <div class="ui-panel">
        <div class="text-[10px] text-blue-400 font-bold uppercase tracking-wider">Tay đua:</div>
        <div id="display-name" class="font-bold text-white truncate mb-2">---</div>
        <div class="space-y-1">
            <div class="flex justify-between text-sm">Điểm: <span id="score" class="font-bold text-yellow-400">0</span></div>
            <div class="flex justify-between text-sm">Chặng: <span id="progress" class="font-bold">0/10</span></div>
        </div>
        <div class="mt-2 text-[10px] opacity-50 text-center">Tốc độ: <span id="speed-display">50</span> km/h</div>
    </div>

    <button id="boost-btn" class="speed-boost-btn">
        <span class="text-[10px]">CHẾ ĐỘ</span>
        <span class="text-lg">KHÓ</span>
    </button>

    <!-- Giao diện câu hỏi -->
    <div id="question-box" class="question-box">
        <div id="q-category" class="text-[10px] font-bold uppercase tracking-widest text-blue-500 mb-1">KIẾN THỨC CƠ BẢN</div>
        <h3 id="q-title" class="font-bold text-lg text-slate-800 leading-tight mb-4">Câu hỏi...</h3>
        <div id="ans-container"></div>
    </div>

    <!-- Màn hình Báo danh -->
    <div id="start-screen" class="screen-overlay">
        <h1 class="text-6xl font-black mb-2 text-yellow-400 italic tracking-tighter">INTERNET<br><span class="text-white">RACER</span></h1>
        <p class="mb-8 text-slate-400">Gói 20 câu hỏi Internet đa cấp độ</p>
        <div class="w-full max-w-xs space-y-4">
            <input type="text" id="input-name" placeholder="Nhập tên của em..." class="w-full p-4 rounded-2xl bg-slate-800 text-white border-2 border-slate-700 focus:border-yellow-500 outline-none text-center text-lg shadow-inner">
            <button onclick="initGame()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-slate-900 px-8 py-4 rounded-2xl font-black text-xl transition-all shadow-lg active:scale-95">VÀO ĐƯỜNG ĐUA</button>
        </div>
        <div class="mt-10 grid grid-cols-2 gap-4 text-[10px] text-slate-500 uppercase font-bold tracking-widest">
            <div class="bg-slate-800/50 p-2 rounded border border-slate-700">⬅️ ➡️ Di chuyển</div>
            <div class="bg-slate-800/50 p-2 rounded border border-slate-700">🎯 Ăn vật phẩm</div>
        </div>
    </div>

    <!-- Màn hình Vinh danh -->
    <div id="finish-screen" class="screen-overlay">
        <div class="text-8xl mb-4">🏆</div>
        <div class="vinh-danh uppercase tracking-widest">VINH DANH</div>
        <h2 id="final-name" class="text-3xl font-bold text-white mb-2">---</h2>
        <div class="bg-white/5 border border-white/10 p-6 rounded-3xl my-6 w-full max-w-xs backdrop-blur-md">
            <div class="text-xs text-yellow-500 uppercase font-bold mb-1">Tổng điểm đạt được</div>
            <div id="final-score" class="text-7xl font-black text-white">0</div>
        </div>
        <p id="rank-comment" class="text-slate-400 mb-8 italic px-4">"Chúc mừng em đã hoàn thành chặng đua tri thức!"</p>
        <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-500 px-10 py-4 rounded-2xl font-bold text-xl transition shadow-lg active:scale-95">CHƠI LẠI</button>
    </div>
</div>

<script>
    // --- HỆ THỐNG ÂM THANH NÂNG CAO ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    let bgmOsc = null;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
    }

    function playSound(freq, type, duration, volume = 0.1, slideTo = null) {
        if (!audioCtx || audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (slideTo) {
            osc.frequency.exponentialRampToValueAtTime(slideTo, audioCtx.currentTime + duration);
        }
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const sfx = {
        correct: () => { 
            playSound(523.25, 'sine', 0.15, 0.2); 
            setTimeout(() => playSound(659.25, 'sine', 0.15, 0.2), 100);
            setTimeout(() => playSound(783.99, 'sine', 0.3, 0.2), 200);
        },
        wrong: () => {
            playSound(150, 'sawtooth', 0.4, 0.2, 50);
        },
        boost: () => {
            playSound(100, 'sawtooth', 0.8, 0.3, 2000);
        },
        engine: (speed) => {
            // Tiếng gầm rú nhẹ theo tốc độ
            if (Math.random() > 0.8) {
                playSound(40 + (speed * 5), 'triangle', 0.1, 0.02);
            }
        },
        finish: () => {
            const notes = [523, 659, 783, 1046];
            notes.forEach((f, i) => {
                setTimeout(() => playSound(f, 'square', 0.5, 0.1), i * 150);
            });
        },
        startBgm: () => {
            // Nhạc nền đơn giản lặp lại
            const loop = () => {
                if (!gameActive) return;
                const now = audioCtx.currentTime;
                const pattern = [220, 164, 220, 196]; // A3, E3, A3, G3
                pattern.forEach((f, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(f, now + i * 0.4);
                    gain.gain.setValueAtTime(0.03, now + i * 0.4);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.4 + 0.3);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now + i * 0.4); osc.stop(now + i * 0.4 + 0.3);
                });
                setTimeout(loop, 1600);
            };
            loop();
        }
    };

    // --- DỮ LIỆU CÂU HỎI ---
    const easyQuestions = [
        { q: "Internet là gì?", a: ["Một phần mềm máy tính", "Một mạng kết nối toàn cầu các máy tính", "Một thiết bị điện tử", "Một trò chơi trực tuyến"], correct: 1 },
        { q: "Internet cho phép người dùng làm gì?", a: ["Chỉ nghe nhạc", "Chỉ gửi email", "Tra cứu thông tin và giao tiếp", "Chỉ chơi game"], correct: 2 },
        { q: "Đặc điểm nổi bật của Internet là gì?", a: ["Kết nối cục bộ", "Tốc độ chậm", "Phạm vi toàn cầu", "Chỉ dùng trong trường học"], correct: 2 },
        { q: "Internet giúp ích gì trong học tập?", a: ["Không có ích", "Chỉ giải trí", "Tìm kiếm tài liệu học tập", "Làm hỏng máy tính"], correct: 2 },
        { q: "Một dịch vụ phổ biến trên Internet là gì?", a: ["Máy in", "Thư điện tử (Email)", "Bàn phím", "Chuột máy tính"], correct: 1 },
        { q: "Internet giúp con người giao tiếp như thế nào?", a: ["Chỉ qua thư tay", "Qua email, mạng xã hội", "Chỉ gọi điện", "Không thể giao tiếp"], correct: 1 },
        { q: "Lợi ích của Internet trong giải trí là gì?", a: ["Xem phim, nghe nhạc", "Chỉ đọc sách giấy", "Không có giải trí", "Chỉ học tập"], correct: 0 },
        { q: "Internet có thể kết nối những gì?", a: ["Chỉ máy tính trong nhà", "Các máy tính trên toàn thế giới", "Chỉ điện thoại", "Chỉ tivi"], correct: 1 },
        { q: "Internet được hiểu chính xác nhất là gì?", a: ["Một hệ thống máy tính cá nhân", "Một mạng toàn cầu kết nối nhiều mạng máy tính với nhau", "Một phần mềm quản lý dữ liệu", "Một hệ điều hành"], correct: 1 },
        { q: "Đặc điểm nào sau đây KHÔNG phải của Internet?", a: ["Tính toàn cầu", "Tính kết nối liên tục", "Tính độc lập, không liên kết", "Khả năng chia sẻ thông tin"], correct: 2 },
        { q: "Giao thức phổ biến giúp truyền tải dữ liệu trên Internet là gì?", a: ["HTTP", "USB", "HDMI", "VGA"], correct: 0 },
        { q: "Lợi ích lớn nhất của Internet trong giáo dục là gì?", a: ["Giảm nhu cầu học tập", "Cung cấp nguồn tài nguyên học tập phong phú", "Thay thế hoàn toàn giáo viên", "Chỉ dùng để giải trí"], correct: 1 },
        { q: "Internet hỗ trợ thương mại điện tử bằng cách nào?", a: ["Chỉ cho phép xem quảng cáo", "Không liên quan đến mua bán", "Cho phép mua bán và thanh toán trực tuyến", "Chỉ dùng để gửi thư"], correct: 2 },
        { q: "Một hạn chế của Internet là gì?", a: ["Không thể truyền thông tin", "Nguy cơ lộ thông tin cá nhân", "Không có nội dung giải trí", "Không thể kết nối toàn cầu"], correct: 1 },
        { q: "WWW (World Wide Web) là gì?", a: ["Toàn bộ Internet", "Một dịch vụ trên Internet dùng để truy cập thông tin", "Một loại phần cứng", "Một phần mềm diệt virus"], correct: 1 },
        { q: "Điều nào sau đây thể hiện tính “chia sẻ” của Internet?", a: ["Chỉ lưu trữ dữ liệu cá nhân", "Cho phép nhiều người truy cập và sử dụng thông tin", "Không cho phép trao đổi dữ liệu", "Chỉ dùng trong nội bộ"], correct: 1 }
    ];

    const hardQuestions = [
        { q: "Khi sử dụng Internet, cần chú ý điều gì?", a: ["Không cần chú ý gì", "Bảo mật thông tin cá nhân", "Chia sẻ mọi thông tin", "Không cần mật khẩu"], correct: 1 },
        { q: "Internet giúp ích gì trong công việc?", a: ["Không có ích", "Gửi email, họp trực tuyến", "Chỉ chơi game", "Chỉ xem phim"], correct: 1 },
        { q: "Internet giúp cải thiện công việc như thế nào?", a: ["Làm giảm hiệu suất làm việc", "Tăng tốc độ trao đổi thông tin và hợp tác", "Không ảnh hưởng đến công việc", "Chỉ dùng để giải trí"], correct: 1 },
        { q: "Khi sử dụng Internet an toàn, người dùng nên làm gì?", a: ["Sử dụng mật khẩu yếu", "Chia sẻ thông tin cá nhân công khai", "Sử dụng mật khẩu mạnh và bảo mật thông tin", "Không cần đăng xuất tài khoản"], correct: 2 }
    ];

    // --- BIẾN TOÀN CỤC ---
    let gameActive = false;
    let score = 0;
    let speed = 5;
    let carPos = 50;
    let obstacles = [];
    let obstacleCount = 0;
    let playerName = "";
    let sessionEasy = [];
    let sessionHard = [];

    const car = document.getElementById('car');
    const road = document.getElementById('road');
    const qBox = document.getElementById('question-box');

    function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

    function initGame() {
        const nameInput = document.getElementById('input-name').value.trim();
        if (!nameInput) { alert("Em hãy nhập tên để báo danh!"); return; }
        
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        playerName = nameInput;
        document.getElementById('display-name').innerText = playerName;
        document.getElementById('start-screen').style.display = 'none';
        
        sessionEasy = shuffle([...easyQuestions]);
        sessionHard = shuffle([...hardQuestions]);
        
        createLanes();
        gameActive = true;
        sfx.startBgm();
        gameLoop();
        setInterval(spawnObstacle, 2200);
    }

    function createLanes() {
        for(let i=0; i<12; i++) {
            let lane = document.createElement('div');
            lane.className = 'lane-mark';
            lane.style.top = (i * 100) + 'px';
            road.appendChild(lane);
        }
    }

    function spawnObstacle() {
        if (!gameActive || qBox.style.display === 'block' || obstacleCount >= 10) return;
        
        const obs = document.createElement('div');
        obs.className = 'obstacle';
        const isHard = Math.random() > 0.75;
        obs.innerHTML = isHard ? '🚀' : '❓';
        obs.style.background = isHard ? 'linear-gradient(135deg, #f59e0b, #ef4444)' : 'linear-gradient(135deg, #3b82f6, #06b6d4)';
        obs.style.left = (Math.random() * 70 + 15) + '%';
        obs.style.top = '-60px';
        road.appendChild(obs);
        obstacles.push({ el: obs, hard: isHard });
    }

    function moveLanes() {
        document.querySelectorAll('.lane-mark').forEach(m => {
            let top = parseInt(m.style.top) + speed;
            if(top > window.innerHeight) top = -100;
            m.style.top = top + 'px';
        });
        sfx.engine(speed);
    }

    function updateObstacles() {
        for(let i = obstacles.length - 1; i >= 0; i--) {
            let obj = obstacles[i];
            let top = parseInt(obj.el.style.top) + speed;
            obj.el.style.top = top + 'px';

            const carRect = car.getBoundingClientRect();
            const obsRect = obj.el.getBoundingClientRect();

            if (obsRect.left < carRect.right && obsRect.right > carRect.left && 
                obsRect.top < carRect.bottom && obsRect.bottom > carRect.top) {
                road.removeChild(obj.el);
                obstacles.splice(i, 1);
                obstacleCount++;
                document.getElementById('progress').innerText = obstacleCount + "/10";
                playSound(400, 'square', 0.1, 0.1, 800); // Sound va chạm vật phẩm
                showQuestion(obj.hard);
            } else if (top > window.innerHeight) {
                road.removeChild(obj.el);
                obstacles.splice(i, 1);
            }
        }
    }

    function showQuestion(isHard) {
        gameActive = false;
        let q;
        if (isHard && sessionHard.length > 0) {
            q = sessionHard.pop();
            document.getElementById('q-category').innerText = "🚀 CHẾ ĐỘ KHÓ - TĂNG TỐC";
            document.getElementById('q-category').style.color = "#ea580c";
        } else {
            q = sessionEasy.length > 0 ? sessionEasy.pop() : easyQuestions[0];
            document.getElementById('q-category').innerText = "❓ KIẾN THỨC CƠ BẢN";
            document.getElementById('q-category').style.color = "#3b82f6";
        }

        document.getElementById('q-title').innerText = q.q;
        const container = document.getElementById('ans-container');
        container.innerHTML = '';

        q.a.forEach((ans, idx) => {
            const btn = document.createElement('button');
            btn.className = 'btn-ans';
            btn.innerText = ans;
            btn.onclick = () => handleAnswer(idx === q.correct, isHard);
            container.appendChild(btn);
        });

        qBox.style.display = 'block';
    }

    function handleAnswer(correct, isHard) {
        qBox.style.display = 'none';
        if (correct) {
            sfx.correct();
            score += isHard ? 30 : 10;
            speed += isHard ? 2.5 : 0.6;
            if (isHard) sfx.boost();
            notify(isHard ? "TUYỆT VỜI! SIÊU TỐC ĐỘ" : "CHÍNH XÁC! +10 ĐIỂM");
        } else {
            sfx.wrong();
            speed = Math.max(4, speed - 1);
            notify("SAI RỒI! GIẢM TỐC");
        }
        
        document.getElementById('score').innerText = score;
        document.getElementById('speed-display').innerText = Math.round(speed * 10);
        
        if (obstacleCount >= 10) {
            setTimeout(finishGame, 800);
        } else {
            gameActive = true;
            sfx.startBgm();
            gameLoop();
        }
    }

    function notify(msg) {
        const n = document.createElement('div');
        n.className = "fixed top-1/3 left-1/2 -translate-x-1/2 bg-yellow-400 text-black px-8 py-3 rounded-full font-black shadow-2xl z-[150] animate-bounce uppercase text-sm border-4 border-white";
        n.innerText = msg;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 1500);
    }

    function gameLoop() {
        if (!gameActive) return;
        moveLanes();
        updateObstacles();
        requestAnimationFrame(gameLoop);
    }

    function finishGame() {
        gameActive = false;
        sfx.finish();
        document.getElementById('finish-screen').style.display = 'flex';
        document.getElementById('final-name').innerText = playerName;
        document.getElementById('final-score').innerText = score;
        
        const comment = document.getElementById('rank-comment');
        if (score >= 180) comment.innerText = "Em là huyền thoại đường đua Internet! Kiến thức thật xuất sắc.";
        else if (score >= 100) comment.innerText = "Rất tốt! Em đã nắm vững các kiến thức về mạng toàn cầu.";
        else comment.innerText = "Khá lắm! Hãy luyện tập thêm để làm chủ thế giới số nhé.";
    }

    // Controls
    window.addEventListener('keydown', (e) => {
        if (!gameActive) return;
        if (e.key === 'ArrowLeft' && carPos > 15) carPos -= 10;
        if (e.key === 'ArrowRight' && carPos < 85) carPos += 10;
        car.style.left = `calc(${carPos}% - 30px)`;
    });

    document.getElementById('boost-btn').addEventListener('click', () => {
        if(gameActive && qBox.style.display === 'none' && obstacleCount < 10) {
            obstacleCount++;
            document.getElementById('progress').innerText = obstacleCount + "/10";
            playSound(400, 'square', 0.1, 0.1, 1200);
            showQuestion(true);
        }
    });

</script>
</body>
</html>
